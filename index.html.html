<!DOCTYPE html>
<html>
<head>
  <title>Wallpaper Hub</title>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 20px;
      border: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .wallpaper {
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
    }

    .wallpaper img {
      width: 100%;
      cursor: pointer;
    }

    .wallpaper a {
      display: block;
      padding: 10px;
      background: #22c55e;
      color: white;
      text-decoration: none;
    }

    #preview {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
    }

    #preview img {
      max-width: 90%;
      margin-top: 5%;
    }

    #preview span {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<header>
  <h1>🌄 Wallpaper Hub</h1>
  <input type="text" id="search" placeholder="Search...">
</header>

<div class="gallery">

  <!-- YOUR 20 WALLPAPERS HERE -->
  <div class="wallpaper" data-name="nature">
    <img src="https://picsum.photos/id/1015/500/300">
    <a href="https://picsum.photos/id/1015/1920/1080" download>Download</a>
  </div>

  <div class="wallpaper" data-name="mountain">
    <img src="https://picsum.photos/id/1016/500/300">
    <a href="https://picsum.photos/id/1016/1920/1080" download>Download</a>
  </div>

  <div class="wallpaper" data-name="forest">
    <img src="https://picsum.photos/id/1018/500/300">
    <a href="https://picsum.photos/id/1018/1920/1080" download>Download</a>
  </div>

  <!-- (you can paste the rest here safely) -->

</div>

<!-- Preview -->
<div id="preview">
  <span onclick="closePreview()">✖</span>
  <img id="preview-img">
</div>

<!-- JavaScript -->
<script>
  const images = document.querySelectorAll(".wallpaper img");
  const preview = document.getElementById("preview");
  const previewImg = document.getElementById("preview-img");

  images.forEach(img => {
    img.addEventListener("click", () => {
      preview.style.display = "block";
      previewImg.src = img.src;
    });
  });

  function closePreview() {
    preview.style.display = "none";
  }

  const search = document.getElementById("search");
  const wallpapers = document.querySelectorAll(".wallpaper");

  search.addEventListener("keyup", () => {
    let value = search.value.toLowerCase();

    wallpapers.forEach(w => {
      let name = w.getAttribute("data-name");

      if (name.includes(value)) {
        w.style.display = "block";
      } else {
        w.style.display = "none";
      }
    });
  });
</script>

</body>
</html>
